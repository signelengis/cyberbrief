<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#090d13;--bg2:#0d1520;--bg3:#111c2e;
--cyan:#00f5ff;--cyan2:#00b8c8;--pink:#ff2d78;
--green:#00ff9d;--red:#ff3a3a;--orange:#ff8c00;
--text:#c8ddf0;--text2:#6a8aaa;--border:#1a2e45;--border2:#0f2035;
--mono:'Share Tech Mono',monospace;--head:'Rajdhani',sans-serif;
}
body{font-family:var(--head);color:var(--text);background:var(--bg);padding:1rem 0;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px;position:relative;z-index:1}
.logo{font-family:var(--mono);font-size:22px;letter-spacing:2px;color:var(--cyan);text-shadow:0 0 18px rgba(0,245,255,0.6)}
.logo span{color:var(--pink);text-shadow:0 0 18px rgba(255,45,120,0.7)}
.date-badge{font-family:var(--mono);font-size:11px;color:var(--cyan2);background:var(--bg2);border:1px solid var(--cyan2);border-radius:2px;padding:3px 10px;letter-spacing:1px}
.btn{display:flex;align-items:center;gap:8px;padding:8px 18px;border:1px solid var(--pink);border-radius:2px;background:transparent;color:var(--pink);font-size:13px;font-family:var(--mono);letter-spacing:1px;cursor:pointer;transition:all 0.15s;text-shadow:0 0 8px rgba(255,45,120,0.4);box-shadow:0 0 10px rgba(255,45,120,0.1)}
.btn:hover{background:rgba(255,45,120,0.07);box-shadow:0 0 18px rgba(255,45,120,0.25)}
.btn:active{transform:scale(0.98)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem;position:relative;z-index:1}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:2px;padding:12px 14px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.m-critical::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.m-high::before{background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.m-breach::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.m-news::before{background:linear-gradient(90deg,transparent,var(--pink),transparent)}
.metric-label{font-family:var(--mono);font-size:10px;color:var(--text2);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.metric-value{font-family:var(--mono);font-size:26px}
.mv-critical{color:var(--red);text-shadow:0 0 12px rgba(255,58,58,0.5)}
.mv-high{color:var(--orange);text-shadow:0 0 12px rgba(255,140,0,0.5)}
.mv-info{color:var(--cyan);text-shadow:0 0 12px rgba(0,245,255,0.4)}
.mv-news{color:var(--pink);text-shadow:0 0 12px rgba(255,45,120,0.4)}
.section{margin-bottom:1.25rem;border:1px solid var(--border);border-radius:2px;overflow:hidden;position:relative;z-index:1;background:var(--bg2)}
.section::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%}
.s-breach::before{background:var(--red)}
.s-cve::before{background:var(--orange)}
.s-threat::before{background:var(--pink)}
.s-news::before{background:var(--cyan)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 18px;background:var(--bg3);cursor:pointer;user-select:none}
.section-title{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.section-icon{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:1px}
.icon-breach{background:rgba(255,58,58,0.12);color:var(--red);border:1px solid rgba(255,58,58,0.3)}
.icon-cve{background:rgba(255,140,0,0.12);color:var(--orange);border:1px solid rgba(255,140,0,0.3)}
.icon-threat{background:rgba(255,45,120,0.12);color:var(--pink);border:1px solid rgba(255,45,120,0.3)}
.icon-news{background:rgba(0,245,255,0.08);color:var(--cyan);border:1px solid rgba(0,245,255,0.25)}
.chevron{font-size:10px;color:var(--text2);transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}
.section-body{padding:0 14px 4px 18px;display:none}
.section-body.open{display:block}
.item{padding:12px 0;border-bottom:1px solid var(--border2)}
.item:last-child{border-bottom:none}
.item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.item-title{font-family:var(--head);font-size:14px;font-weight:600;line-height:1.4;color:#e0f0ff}
.badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:1px;white-space:nowrap;flex-shrink:0;letter-spacing:1px}
.badge-critical{background:rgba(255,58,58,0.12);color:var(--red);border:1px solid rgba(255,58,58,0.35)}
.badge-high{background:rgba(255,140,0,0.1);color:var(--orange);border:1px solid rgba(255,140,0,0.3)}
.badge-medium{background:rgba(0,255,157,0.08);color:var(--green);border:1px solid rgba(0,255,157,0.25)}
.badge-info{background:rgba(0,245,255,0.08);color:var(--cyan);border:1px solid rgba(0,245,255,0.25)}
.badge-news{background:rgba(255,45,120,0.1);color:var(--pink);border:1px solid rgba(255,45,120,0.3)}
.badge-threat{background:rgba(255,45,120,0.1);color:var(--pink);border:1px solid rgba(255,45,120,0.3)}
.item-meta{font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:6px;letter-spacing:0.5px}
.item-desc{font-family:var(--head);font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.ioc-list{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.ioc{font-family:var(--mono);font-size:10px;background:rgba(0,245,255,0.05);border:1px solid rgba(0,245,255,0.15);border-radius:1px;padding:2px 7px;color:var(--cyan2)}
.source-label{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:6px;margin-bottom:3px}
.sources{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px;margin-bottom:4px}
.source-link{font-family:var(--mono);font-size:10px;color:var(--cyan2);text-decoration:none;background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.15);border-radius:1px;padding:2px 8px;letter-spacing:0.5px;transition:all 0.15s}
.source-link:hover{background:rgba(0,245,255,0.1);color:var(--cyan);border-color:rgba(0,245,255,0.35)}
.footer{font-family:var(--mono);font-size:10px;color:var(--text2);text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);letter-spacing:1px;position:relative;z-index:1}
</style>
</head>

function renderSources(sources){
  if(!sources||!sources.length) return '';
  var h='<div class="source-label">// sources</div><div class="sources">';
  for(var i=0;i<sources.length;i++)
    h+='<a class="source-link" href="'+esc(sources[i].url)+'" target="_blank" rel="noopener">'+esc(sources[i].label)+' &#x2197;</a>';
  return h+'</div>';
}

function toggleSection(id){
  var body=document.getElementById('body_'+id), chev=document.getElementById('chev_'+id);
  var open=body.classList.toggle('open');
  body.style.display=open?'block':'none';
  chev.classList.toggle('open',open);
}

function renderBreaches(items){
  var h='';
  for(var i=0;i<items.length;i++){
    var b=items[i];
    h+='<div class="item"><div class="item-header"><div class="item-title">'+esc(b.org)+'</div><span class="badge '+badgeClass(b.severity)+'">'+esc(b.severity)+'</span></div>';
    h+='<div class="item-meta">'+esc(b.date)+(b.records?' &bull; '+esc(b.records):'')+'</div>';
    h+='<div class="item-desc">'+esc(b.summary)+'</div>'+renderSources(b.sources)+'</div>';
  }
  return h;
}
function renderCVEs(items){
  var h='';
  for(var i=0;i<items.length;i++){
    var c=items[i];
    h+='<div class="item"><div class="item-header"><div class="item-title">'+esc(c.cve_id)+' &mdash; '+esc(c.product)+'</div><span class="badge '+badgeClass(c.severity)+'">'+esc(c.severity)+(c.cvss?' | CVSS '+esc(c.cvss):'')+'</span></div>';
    h+='<div class="item-meta">'+esc(c.vendor)+(c.patch_status?' &bull; '+esc(c.patch_status):'')+'</div>';
    h+='<div class="item-desc">'+esc(c.summary)+'</div>'+renderSources(c.sources)+'</div>';
  }
  return h;
}
function renderThreats(items){
  var h='';
  for(var i=0;i<items.length;i++){
    var t=items[i];
    h+='<div class="item"><div class="item-header"><div class="item-title">'+esc(t.actor)+'</div><span class="badge badge-threat">'+esc(t.type)+'</span></div>';
    h+='<div class="item-meta">'+esc(t.targets)+(t.ttp?' &bull; '+esc(t.ttp):'')+'</div>';
    h+='<div class="item-desc">'+esc(t.summary)+'</div>';
    if(t.iocs&&t.iocs.length){
      h+='<div class="ioc-list">';
      for(var j=0;j<Math.min(t.iocs.length,5);j++) h+='<span class="ioc">'+esc(t.iocs[j])+'</span>';
      h+='</div>';
    }
    h+=renderSources(t.sources)+'</div>';
  }
  return h;
}
function renderNews(items){
  var h='';
  for(var i=0;i<items.length;i++){
    var n=items[i];
    h+='<div class="item"><div class="item-header"><div class="item-title">'+esc(n.title)+'</div><span class="badge badge-news">'+esc(n.category)+'</span></div>';
    h+='<div class="item-meta">'+esc(n.source)+(n.date?' &bull; '+esc(n.date):'')+'</div>';
    h+='<div class="item-desc">'+esc(n.summary)+'</div>'+renderSources(n.sources)+'</div>';
  }
  return h;
}
var RENDERERS={breach:renderBreaches,cve:renderCVEs,threat:renderThreats,news:renderNews};

function renderReport(){
  var h='';
  for(var i=0;i<SECTIONS.length;i++){
    var s=SECTIONS[i];
    h+='<div class="section '+s.cls+'"><div class="section-header" onclick="toggleSection(\''+s.id+'\')">';
    h+='<div class="section-title"><span class="section-icon '+s.icon+'">'+s.label+'</span>'+s.title+'</div>';
    h+='<div class="chevron open" id="chev_'+s.id+'">&#x25BE;</div></div>';
    h+='<div class="section-body open" id="body_'+s.id+'">'+RENDERERS[s.id](DATA[s.id])+'</div></div>';
  }
  document.getElementById('reportSections').innerHTML=h;
  var crit=0,high=0;
  for(var i=0;i<DATA.cve.length;i++){
    var sv=(DATA.cve[i].severity||'').toLowerCase();
    if(sv==='critical') crit++; else if(sv==='high') high++;
  }
  document.getElementById('mCritical').textContent=crit;
  document.getElementById('mHigh').textContent=high;
  document.getElementById('mBreaches').textContent=DATA.breach.length;
  document.getElementById('mNews').textContent=DATA.news.length;
}

function emailReport(){
  var dateStr=today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var d50='==================================================';
  var d40='----------------------------------------';
  var body='CYBERBRIEF // DAILY SECURITY INTELLIGENCE\n'+dateStr+'\n'+d50+'\n\n';
  var titles={breach:'BREACH REPORT',cve:'VULNERABILITY TRACKER (CVEs)',threat:'THREAT INTELLIGENCE',news:'SITUATION REPORT'};
  for(var i=0;i<SECTIONS.length;i++){
    var sid=SECTIONS[i].id;
    body+='\n[ '+titles[sid]+' ]\n'+d40+'\n';
    var items=DATA[sid];
    for(var j=0;j<items.length;j++){
      var item=items[j];
      var name=item.org||item.cve_id||item.actor||item.title||'';
      var sev=item.severity||item.type||item.category||'';
      body+='\n'+name+(sev?' ['+sev+']':'')+'\n';
      if(item.date) body+=item.date+(item.records?' | '+item.records:'')+'\n';
      if(item.vendor) body+=item.vendor+(item.patch_status?' | '+item.patch_status:'')+'\n';
      if(item.targets) body+='Targets: '+item.targets+'\n';
      if(item.summary) body+=item.summary+'\n';
      if(item.iocs&&item.iocs.length) body+='IOCs: '+item.iocs.join(', ')+'\n';
      if(item.sources&&item.sources.length){
        var srcs=[];
        for(var k=0;k<item.sources.length;k++) srcs.push(item.sources[k].label+': '+item.sources[k].url);
        body+='Sources: '+srcs.join(' | ')+'\n';
      }
    }
    body+='\n';
  }
  body+='\n'+d50+'\nGenerated by CyberBrief // Verify all findings with primary sources.';
  var to=prompt('Enter recipient email addresses (comma-separated):','');
  if(to===null||!to.trim()) return;
  var recipients=to.split(',').map(function(e){return e.trim();}).filter(Boolean).join(',');
  window.location.href='mailto:'+recipients+'?subject='+encodeURIComponent('CyberBrief // Daily Intel - '+dateStr)+'&body='+encodeURIComponent(body);
}

renderReport();
</script>
</body>
