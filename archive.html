<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>CyberBrief Archive // Historical Intel</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Rajdhani',sans-serif;color:#c8ddf0;background:#090d13;padding:1rem;min-height:100vh;position:relative}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:100}
  .wrap{max-width:1100px;margin:0 auto;position:relative;z-index:1}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
  .logo{font-family:'Share Tech Mono',monospace;font-size:22px;letter-spacing:2px;color:#ff8c00;text-shadow:0 0 18px rgba(255,140,0,0.6)}
  .logo span{color:#ff2d78;text-shadow:0 0 18px rgba(255,45,120,0.7)}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border:1px solid #00f5ff;border-radius:2px;background:transparent;color:#00f5ff;font-size:13px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;cursor:pointer;text-shadow:0 0 8px rgba(0,245,255,0.4);box-shadow:0 0 10px rgba(0,245,255,0.1);transition:all 0.15s;text-decoration:none}
  .btn:hover{background:rgba(0,245,255,0.07);box-shadow:0 0 18px rgba(0,245,255,0.25)}
  .section{margin-bottom:1.25rem;border:1px solid #1a2e45;border-radius:2px;overflow:hidden;position:relative;background:#0d1520}
  .section::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:#ff8c00}
  .shead{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 18px;background:#111c2e;cursor:pointer;user-select:none}
  .stitle{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:10px;color:#ff8c00}
  .chev{font-size:10px;color:#6a8aaa;transition:transform .2s}
  .chev.open{transform:rotate(180deg)}
  .sbody{padding:0 14px 4px 18px;display:none}
  .sbody.open{display:block}
  .item{padding:12px 0;border-bottom:1px solid #0f2035}
  .item:last-child{border-bottom:none}
  .ihead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
  .ititle{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;line-height:1.4;color:#e0f0ff}
  .badge{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 8px;border-radius:1px;white-space:nowrap;flex-shrink:0;letter-spacing:1px}
  .b-archived{background:rgba(255,140,0,0.12);color:#ff8c00;border:1px solid rgba(255,140,0,0.35)}
  .age{font-family:'Share Tech Mono',monospace;font-size:9px;color:#6a8aaa;margin-top:4px}
  .imeta{font-family:'Share Tech Mono',monospace;font-size:11px;color:#6a8aaa;margin-bottom:6px;letter-spacing:0.5px}
  .idesc{font-family:'Rajdhani',sans-serif;font-size:13px;color:#6a8aaa;line-height:1.6}
  .src-link{font-family:'Share Tech Mono',monospace;font-size:10px;color:#00b8c8;text-decoration:none;background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.15);border-radius:1px;padding:2px 8px;letter-spacing:0.5px;display:inline-block;margin-right:5px;margin-top:5px;transition:all 0.15s}
  .src-link:hover{background:rgba(0,245,255,0.1);color:#00f5ff;border-color:rgba(0,245,255,0.35)}
  .footer{font-family:'Share Tech Mono',monospace;font-size:10px;color:#6a8aaa;text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid #1a2e45;letter-spacing:1px}
  .empty{text-align:center;color:#6a8aaa;padding:2rem;font-family:'Share Tech Mono',monospace}
  .loading{text-align:center;color:#00f5ff;padding:2rem}
  /* DIABLO */
  body.theme-diablo{background:#0a0604;color:#d4b88a;background-image:radial-gradient(ellipse at top,#1a0a05 0%,#0a0604 60%)}
  body.theme-diablo .logo{color:#e8c469;text-shadow:0 0 20px rgba(232,196,105,0.7)}body.theme-diablo .logo span{color:#a01818;text-shadow:0 0 22px rgba(200,30,30,0.9)}
  body.theme-diablo .btn{background:linear-gradient(180deg,#3a1a0a,#1f0d05);border-color:#8b2a1a;color:#e8c469;text-shadow:0 0 8px rgba(232,196,105,0.5);box-shadow:0 0 12px rgba(139,42,26,0.4)}
  body.theme-diablo .section{background:linear-gradient(180deg,#1a0d07,#0e0604);border-color:#6a3818}body.theme-diablo .section::before{background:linear-gradient(180deg,#e8c469,#a01818)}
  body.theme-diablo .shead{background:linear-gradient(180deg,#2a1408,#1a0d07);border-bottom:1px solid #6a3818}
  body.theme-diablo .stitle{color:#e8c469}body.theme-diablo .ititle{color:#f0d8a0}body.theme-diablo .imeta,body.theme-diablo .footer,body.theme-diablo .age{color:#a88560}body.theme-diablo .idesc{color:#c9a878}
  body.theme-diablo .item{border-bottom-color:#3a1f10}body.theme-diablo .footer{border-top-color:#6a3818}
  body.theme-diablo .b-archived{background:rgba(200,30,30,0.18);color:#ff3a1a;border-color:#8b1818}
  body.theme-diablo .src-link{background:rgba(139,42,26,0.18);border-color:#8b2a1a;color:#e8c469}
  /* STEAMPUNK */
  body.theme-steampunk{background:#1f1610;color:#d9c39a;background-image:radial-gradient(ellipse at center,#2a1f15 0%,#15100a 70%)}
  body.theme-steampunk .logo{color:#d4a356;text-shadow:0 0 10px rgba(212,163,86,0.6)}body.theme-steampunk .logo span{color:#8b4513}
  body.theme-steampunk .btn{background:linear-gradient(180deg,#5a4226,#3a2a18);border-color:#8b6f47;color:#d4a356;text-shadow:0 0 6px rgba(212,163,86,0.5);box-shadow:inset 0 1px 2px rgba(212,163,86,0.2)}
  body.theme-steampunk .section{background:linear-gradient(180deg,#2a1f15,#15100a);border-color:#8b6f47}body.theme-steampunk .section::before{background:#d4a356}
  body.theme-steampunk .shead{background:linear-gradient(180deg,#3a2a18,#2a1f15);border-bottom:1px solid #8b6f47}
  body.theme-steampunk .stitle,body.theme-steampunk .ititle{color:#d4a356}body.theme-steampunk .imeta,body.theme-steampunk .footer,body.theme-steampunk .age{color:#a08868}body.theme-steampunk .idesc{color:#c9b88a}
  body.theme-steampunk .item{border-bottom-color:#3a2a18}body.theme-steampunk .footer{border-top-color:#8b6f47}
  body.theme-steampunk .b-archived{background:rgba(212,163,86,0.15);color:#d4a356;border-color:#8b6f47}
  body.theme-steampunk .src-link{background:rgba(139,111,71,0.18);border-color:#8b6f47;color:#d4a356}
  /* GOTH */
  body.theme-goth{background:#0a0612;color:#b8a8c8;background-image:radial-gradient(ellipse at top,#1a0d28 0%,#050310 70%)}
  body.theme-goth .logo{color:#d8b8e8;text-shadow:0 0 20px rgba(216,184,232,0.7)}body.theme-goth .logo span{color:#8b1a3a;text-shadow:0 0 20px rgba(139,26,58,0.8)}
  body.theme-goth .btn{background:linear-gradient(180deg,#2a1240,#15081f);border-color:#6a2a8a;color:#d8b8e8;text-shadow:0 0 8px rgba(216,184,232,0.5);box-shadow:0 0 12px rgba(106,42,138,0.4)}
  body.theme-goth .section{background:linear-gradient(180deg,#1a0d28,#0a0612);border-color:#5a2a6a}body.theme-goth .section::before{background:linear-gradient(180deg,#d8b8e8,#8b1a3a)}
  body.theme-goth .shead{background:linear-gradient(180deg,#2a1240,#1a0d28);border-bottom:1px solid #5a2a6a}
  body.theme-goth .stitle,body.theme-goth .ititle{color:#d8b8e8}body.theme-goth .imeta,body.theme-goth .footer,body.theme-goth .age{color:#9888a8}body.theme-goth .idesc{color:#b8a8c8}
  body.theme-goth .item{border-bottom-color:#3a1a4a}body.theme-goth .footer{border-top-color:#5a2a6a}
  body.theme-goth .b-archived{background:rgba(160,96,208,0.2);color:#a060d0;border-color:#6a2a8a}
  body.theme-goth .src-link{background:rgba(106,42,138,0.2);border-color:#6a2a8a;color:#d8b8e8}
  /* WESTERN */
  body.theme-western{background:#2a1f15;color:#d9c39a;background-image:radial-gradient(ellipse at top,#4a3520 0%,#1a1208 80%)}
  body.theme-western .logo{color:#e8a040;text-shadow:0 0 15px rgba(232,160,64,0.7)}body.theme-western .logo span{color:#c04020;text-shadow:0 0 15px rgba(192,64,32,0.7)}
  body.theme-western .btn{background:linear-gradient(180deg,#5a3a20,#3a2510);border-color:#8b5a30;color:#e8a040;text-shadow:0 0 6px rgba(232,160,64,0.5)}
  body.theme-western .section{background:linear-gradient(180deg,#3a2a18,#1a1208);border-color:#8b5a30}body.theme-western .section::before{background:linear-gradient(180deg,#e8a040,#c04020)}
  body.theme-western .shead{background:linear-gradient(180deg,#5a3a20,#3a2510);border-bottom:1px solid #8b5a30}
  body.theme-western .stitle,body.theme-western .ititle{color:#e8a040}body.theme-western .imeta,body.theme-western .footer,body.theme-western .age{color:#a88860}body.theme-western .idesc{color:#c9b88a}
  body.theme-western .item{border-bottom-color:#4a3520}body.theme-western .footer{border-top-color:#8b5a30}
  body.theme-western .b-archived{background:rgba(232,160,64,0.2);color:#e8a040;border-color:#8b5a30}
  body.theme-western .src-link{background:rgba(139,90,48,0.2);border-color:#8b5a30;color:#e8a040}
  .theme-toggle{position:fixed;bottom:1rem;right:1rem;z-index:200;padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;background:transparent;border:1px solid #ff8c00;color:#ff8c00;border-radius:2px;cursor:pointer;text-shadow:0 0 8px rgba(255,140,0,0.4)}
  body.theme-diablo .theme-toggle{border-color:#8b2a1a;color:#e8c469;background:linear-gradient(180deg,#3a1a0a,#1f0d05)}
  body.theme-steampunk .theme-toggle{border-color:#8b6f47;color:#d4a356;background:linear-gradient(180deg,#5a4226,#3a2a18)}
  body.theme-goth .theme-toggle{border-color:#6a2a8a;color:#d8b8e8;background:linear-gradient(180deg,#2a1240,#15081f)}
  body.theme-western .theme-toggle{border-color:#8b5a30;color:#e8a040;background:linear-gradient(180deg,#5a3a20,#3a2510)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">[ CYBER<span>ARCHIVE</span> ]</div>
    <a href="ui_kits/brief/index.html" class="btn">// BACK TO BRIEF ↖</a>
  </div>
  <div id="archive" class="loading">// LOADING ARCHIVED ITEMS...</div>
  <div class="footer">// CYBERBRIEF ARCHIVE &mdash; AGED OUT INTEL &mdash; HISTORICAL REFERENCE ONLY //</div>
</div>
<script>
var ARCHIVE_DATA=null;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function loadArchive(){
  document.getElementById('archive').innerHTML='<div class="loading">// LOADING ARCHIVED ITEMS...</div>';
  fetch('archive.json').then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(d=>{
    ARCHIVE_DATA=d;
    renderArchive();
  }).catch(e=>{
    console.error('Failed to load archive:',e);
    document.getElementById('archive').innerHTML='<div class="empty">// NO ARCHIVED ITEMS YET //</div>';
  });
}
function rSrcs(srcs){if(!srcs||!srcs.length)return '';var h='';for(var i=0;i<srcs.length;i++)h+='<a class="src-link" href="'+esc(srcs[i].url)+'" target="_blank" rel="noopener">'+esc(srcs[i].label)+' ↗</a>';return h}
function renderArchive(){
  if(!ARCHIVE_DATA||(!ARCHIVE_DATA.breach&&!ARCHIVE_DATA.cve&&!ARCHIVE_DATA.threat&&!ARCHIVE_DATA.news)){
    document.getElementById('archive').innerHTML='<div class="empty">// NO ARCHIVED ITEMS YET //</div>';
    return;
  }
  var html='';
  var sections=[
    {id:'breach',title:'// ARCHIVED BREACHES'},
    {id:'cve',title:'// ARCHIVED VULNERABILITIES'},
    {id:'threat',title:'// ARCHIVED THREATS'},
    {id:'news',title:'// ARCHIVED NEWS'}
  ];
  sections.forEach(s=>{
    var items=ARCHIVE_DATA[s.id]||[];
    if(items.length===0)return;
    html+='<div class="section"><div class="shead" onclick="tog(\''+s.id+'\')"><div class="stitle">'+s.title+' ('+items.length+')</div><div class="chev open" id="c_'+s.id+'">&#x25BE;</div></div><div class="sbody open" id="b_'+s.id+'">';
    items.forEach(item=>{
      var title=item.org||item.cve_id||item.actor||item.title||'Unknown';
      var meta=item.date||(item.vendor?item.vendor:'')|(item.source?item.source:'');
      var age=item.age||'unknown';
      html+='<div class="item"><div class="ihead"><div class="ititle">'+esc(title)+'</div><span class="badge b-archived">ARCHIVED • '+esc(age)+' refreshes</span></div>';
      if(meta)html+='<div class="imeta">'+esc(meta)+'</div>';
      if(item.summary)html+='<div class="idesc">'+esc(item.summary)+'</div>';
      if(item.sources)html+=rSrcs(item.sources);
      html+='<div class="age">// Archived after '+esc(age)+' refresh cycles</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('archive').innerHTML=html;
}
function tog(id){var b=document.getElementById('b_'+id),c=document.getElementById('c_'+id);if(!b||!c)return;var o=b.classList.toggle('open');b.style.display=o?'block':'none';c.classList.toggle('open',o)}
window.tog=tog;
loadArchive();
var THEMES=['cyber','diablo','steampunk','goth','western'];
var THEME_LABELS={cyber:'CYBER',diablo:'DIABLO',steampunk:'STEAMPUNK',goth:'GOTH',western:'WESTERN'};
function applyTheme(t){THEMES.forEach(function(x){document.body.classList.remove('theme-'+x)});if(t!=='cyber')document.body.classList.add('theme-'+t);var b=document.getElementById('themeToggle');if(b)b.textContent='// THEME: '+THEME_LABELS[t]}
function toggleTheme(){var cur=localStorage.getItem('cbTheme')||'cyber';var idx=(THEMES.indexOf(cur)+1)%THEMES.length;var next=THEMES[idx];localStorage.setItem('cbTheme',next);applyTheme(next)}
applyTheme(localStorage.getItem('cbTheme')||'cyber');
</script>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">// THEME: CYBER</button>
</body>
</html>
